<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QEC Lecture Notes</title>
    <style>
      :root {
        color: #f4f7fb;
        background: #000000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 900px;
        padding: 64px 32px;
      }

      h1 {
        margin: 0 0 40px;
        padding-bottom: 24px;
        border-bottom: 1px solid #2a2f3a;
        font-size: clamp(2.25rem, 6vw, 3.75rem);
        line-height: 1.1;
      }

      a {
        color: #58a6ff;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .notes-link {
        display: inline-block;
        margin-bottom: 18px;
        padding-bottom: 18px;
        border-bottom: 1px solid #2a2f3a;
        font-size: clamp(1.75rem, 4vw, 2.75rem);
        font-weight: 700;
      }

      .description {
        max-width: 860px;
        margin: 0;
        color: #8ee3d2;
        font-size: clamp(1.15rem, 2.6vw, 1.65rem);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Download page</h1>
      <a class="notes-link" href="Qec_12.pdf">QEC Lecture notes</a>
      <p class="description">
        These lecture notes are intended for readers with a basic background in linear algebra.
        No prior knowledge of physics or computer science is assumed. The notes may contain
        typographical errors; please feel free to let me know if you find any.
      </p>
    </main>
  </body>
</html>
